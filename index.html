<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📒 Dukaan Entry List</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">
  
  <div class="max-w-4xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-6">📒 Dukaan Entry List</h1>

    <!-- Customer Form -->
    <form id="customerForm" class="bg-white p-4 shadow rounded mb-6 grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" id="customerName" placeholder="Customer Name" required class="text-sm md:text-base px-4 py-2">
      <input type="tel" id="customerPhone" placeholder="Phone Number" class="text-sm md:text-base px-4 py-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded col-span-1 md:col-span-2 text-sm md:text-base">Add Customer</button>
    </form>

    <!-- Toggle Manage Customers -->
    <button onclick="toggleCustomerManager()" class="bg-yellow-500 text-white px-4 py-2 rounded mb-2 text-sm md:text-base">
      ⚙️ Manage Customers
    </button>

    <!-- Manage Customers Section -->
    <div id="customerManager" class="bg-white p-4 shadow rounded mb-6 hidden">
      <h2 class="text-xl font-semibold mb-4">Manage Customers</h2>
      <ul id="customerList" class="space-y-2"></ul>
    </div>

    <!-- Dukaan Form -->
    <form id="dukaanForm" class="bg-white p-4 shadow rounded mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
      <select id="dukaanCustomer" required class="text-sm md:text-base px-4 py-2"></select>
      <input type="text" id="dukaanItem" placeholder="Item" required class="text-sm md:text-base px-4 py-2">
      <input type="number" id="dukaanAmount" placeholder="Amount ₹" required class="text-sm md:text-base px-4 py-2">
      <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded col-span-1 md:col-span-3 text-sm md:text-base">Add Entry</button>
    </form>

    <!-- Entries Display -->
    <div class="bg-white p-4 shadow rounded">
      <h2 class="text-xl font-semibold mb-4">All Entries</h2>

      <div id="totalSummary" class="text-lg font-semibold text-right mb-3 text-blue-700"></div>

      <button id="toggleViewBtn" onclick="toggleView()" class="mb-4 bg-purple-600 text-white px-4 py-2 rounded text-sm md:text-base">
        🔓 Show All Entries
      </button>

      <div class="overflow-x-auto">
        <table class="min-w-full border-collapse text-sm">
          <thead>
            <tr class="bg-gray-200">
              <th class="p-2 text-left">#</th>
              <th class="p-2 text-left">Customer</th>
              <th class="p-2 text-left">Item</th>
              <th class="p-2 text-left">Amount</th>
              <th class="p-2 text-left">Date</th>
              <th class="p-2 text-left">Actions</th>
            </tr>
          </thead>
          <tbody id="summaryTable"></tbody>
        </table>
      </div>

      <div id="customerBalances" class="mt-6 text-sm text-gray-800 bg-gray-100 p-3 rounded shadow"></div>

      <button onclick="downloadPDF()" class="mt-4 bg-black text-white px-4 py-2 rounded text-sm md:text-base">📄 Export as PDF</button>
      <button onclick="sendMonthlySummary()" class="mt-4 bg-green-700 text-white px-4 py-2 rounded text-sm md:text-base">📤 Send WhatsApp Summary</button>
    </div>
  </div>

  <!-- Printable Area for PDF (hidden) -->
  <div id="printableArea" style="display:none; padding: 10px; font-size: 14px;">
    <h2 style="font-weight:bold; font-size:16px;">📒 Dukaan Entries</h2>
    <table style="width:100%; border-collapse: collapse;" border="1">
      <thead>
        <tr style="background:#eee;">
          <th>#</th>
          <th>Customer</th>
          <th>Item</th>
          <th>Amount</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="printTableBody"></tbody>
    </table>
  </div>

  <!-- JS Script -->
  <script src="script.js"></script>
</body>

</html>
